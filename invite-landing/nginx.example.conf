# Example: serve invite landing at https://nesthamapp.com/invite/ABC123
# Copy invite-landing/ to /var/www/nestham/invite/ on your server.

server {
    listen 443 ssl http2;
    server_name nesthamapp.com www.nesthamapp.com;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    root /var/www/nestham;

    location = /invite {
        return 301 /invite/;
    }

    location /invite/ {
        try_files $uri $uri/ /invite/index.html;
    }

    # Optional: redirect apex www
    # if ($host = www.nesthamapp.com) { return 301 https://nesthamapp.com$request_uri; }
}
