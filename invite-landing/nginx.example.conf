# Example: serve invite landing at https://your-domain.com/9WA99354
# Copy invite-landing/invite/ to /var/www/selecto-invite/ on your server.

server {
    listen 443 ssl http2;
    server_name nesthamapp.com www.nesthamapp.com;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    root /var/www/nestham;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: redirect apex www
    # if ($host = www.nesthamapp.com) { return 301 https://nesthamapp.com$request_uri; }
}
