plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'host.exp.exponent'
version = '1.0.0'

android {
  namespace "expo.modules.incomingcallandroid"
  defaultConfig {
    versionCode 6
    versionName "1.0.5"
  }
}

dependencies {
  implementation project(':expo-modules-core')
  implementation "androidx.core:core:1.13.1"
}
